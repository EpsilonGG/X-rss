name: Update feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feeds
        run: python main.py

      - name: Commit generated feeds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated feeds"
          file_pattern: feeds/*.xml
